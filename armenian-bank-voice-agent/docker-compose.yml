version: "3.8"

# Self-hosted LiveKit server (open-source, no LiveKit Cloud)
services:
  livekit:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"       # HTTP / WebSocket
      - "7881:7881"       # RTC TCP
      - "7882:7882/udp"   # RTC UDP
    environment:
      - LIVEKIT_KEYS=devkey:secret   # matches .env API key:secret
    restart: unless-stopped